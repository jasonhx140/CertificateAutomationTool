name: Build Windows Exe

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 清理旧文件
      shell: cmd
      run: |
        if exist build rmdir /s /q build
        if exist dist rmdir /s /q dist

    - name: 执行PyInstaller打包(onedir模式)
      shell: cmd
      run: |
        pyinstaller 合格证自动化系统.spec --clean --noconfirm

    - name: 获取文件信息
      shell: cmd
      run: |
        echo "=== 生成的文件信息 ==="
        dir dist
        dir dist\合格证自动化系统

    - name: 打包为zip
      shell: cmd
      run: |
        cd dist
        powershell Compress-Archive -Path "合格证自动化系统" -DestinationPath "合格证自动化系统.zip" -Force
        cd ..
        echo "=== Zip文件信息 ==="
        dir dist\*.zip

    - name: 上传构建产物(zip包)
      uses: actions/upload-artifact@v4
      with:
        name: 合格证自动化系统-windows
        path: dist/合格证自动化系统.zip
        retention-days: 30

    - name: 创建Release（仅tag时）
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/合格证自动化系统.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
